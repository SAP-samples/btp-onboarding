opencollection: 1.0.0
info:
  name: aicore-dg-sharepoint
config:
  environments:
    - name: aicore-dg-sharepoint
      variables:
        - name: AICore_AI_API_URL
          value: <placeholder>
        - name: AICore_clientid
          value: <placeholder>
        - name: AICore_clientsecret
          value: <placeholder>
        - name: AICore_url
          value: <placeholder>
        - name: MS_Entra_Tenant_ID
          value: <placeholder>
        - name: MS_Entra_Application_ID
          value: <placeholder>
        - name: MS_Entra_Application_Client_Secret
          value: <placeholder>
        - name: SharePoint_URL
          value: <placeholder>
        - name: resource_group
          value: j4c-custom-knowledge
        - name: generic_secret
          value: sharepoint
        - name: pipeline_id
          value: ''
items:
  - info:
      name: 01_get_token
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: get_token
          type: http
          seq: 1
        http:
          method: POST
          url: '{{AICore_url}}/oauth/token'
          headers:
            - name: Content-Type
              value: application/x-www-form-urlencoded
          body:
            type: form-urlencoded
            data:
              - name: grant_type
                value: client_credentials
              - name: client_id
                value: '{{AICore_clientid}}'
              - name: client_secret
                value: '{{AICore_clientsecret}}'
        runtime:
          scripts:
            - type: after-response
              code: |-
                if (res.getStatus() == 200) {
                  bru.setVar("access_token", res.body.access_token);
                }
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: 02_resource_group
      type: folder
      seq: 2
    items:
      - info:
          name: create_resource_group
          type: http
          seq: 1
        http:
          method: POST
          url: '{{AICore_AI_API_URL}}/v2/admin/resourceGroups'
          body:
            type: json
            data: |-
              {
                "resourceGroupId": "{{resource_group}}",
                "labels": [
                  {
                    "key": "ext.ai.sap.com/document-grounding",
                    "value": "true"
                  }
                ]
              }
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: get_resource_group
          type: http
          seq: 2
        http:
          method: GET
          url: '{{AICore_AI_API_URL}}/v2/admin/resourceGroups/{{resource_group}}'
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Additional requests
          type: folder
          seq: 3
        request:
          auth: inherit
        items:
          - info:
              name: get_all_resource_groups
              type: http
              seq: 1
            http:
              method: GET
              url: '{{AICore_AI_API_URL}}/v2/admin/resourceGroups'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: delete_resource_group
              type: http
              seq: 2
            http:
              method: DELETE
              url: '{{AICore_AI_API_URL}}/v2/admin/resourceGroups/{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
  - info:
      name: 03_generic_secret
      type: folder
      seq: 3
    items:
      - info:
          name: create_generic_secret
          type: http
          seq: 1
        http:
          method: POST
          url: '{{AICore_AI_API_URL}}/v2/admin/secrets'
          headers:
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          body:
            type: json
            data: |-
              {
                "name": "{{generic_secret}}",
                "data": {
                  "description": "{{repository-description}}",
                  "url": "{{repository-url}}",
                  "authentication": "{{repository-authentication}}",
                  "clientId": "{{repository-clientId}}",
                  "clientSecret": "{{repository-clientSecret}}",
                  "tokenServiceURL": "{{repository-tokenServiceURL}}"
                },
                "labels": [
                  {
                    "key": "ext.ai.sap.com/document-grounding",
                    "value": "true"
                  },
                  {
                    "key": "ext.ai.sap.com/documentRepositoryType",
                    "value": "MSSharePoint"
                  }
                ]
              }
          auth:
            type: bearer
            token: '{{access_token}}'
        runtime:
          scripts:
            - type: before-request
              code: |-
                const sharepointUrl = (bru.getEnvVar("SharePoint_URL") || "").trim();
                const entraTenantId = (bru.getEnvVar("MS_Entra_Tenant_ID") || "").trim();
                const clientId = (bru.getEnvVar("MS_Entra_Application_ID") || "").trim();
                const clientSecret = (bru.getEnvVar("MS_Entra_Application_Client_Secret") || "").trim();

                if (!sharepointUrl) throw new Error("Environment variable 'SharePoint_URL' is not defined.");
                if (!entraTenantId) throw new Error("Environment variable 'MS_Entra_Tenant_ID' is not defined.");
                if (!clientId) throw new Error("Environment variable 'MS_Entra_Application_ID' is not defined.");
                if (!clientSecret) throw new Error("Environment variable 'MS_Entra_Application_Client_Secret' is not defined.");

                const tokenServiceURL = `https://login.microsoftonline.com/${entraTenantId}/oauth2/v2.0/token`;

                const toB64 = (s) => Buffer.from(s, "utf-8").toString("base64");

                bru.setVar("repository-description", toB64("Microsoft SharePoint"));
                bru.setVar("repository-url", toB64(sharepointUrl));
                bru.setVar("repository-authentication", toB64("OAuth2ClientCredentials"));
                bru.setVar("repository-clientId", toB64(clientId));
                bru.setVar("repository-clientSecret", toB64(clientSecret));
                bru.setVar("repository-tokenServiceURL", toB64(tokenServiceURL));
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Additional requests
          type: folder
          seq: 2
        request:
          auth: inherit
        items:
          - info:
              name: get_all_generic_secrets
              type: http
              seq: 1
            http:
              method: GET
              url: '{{AICore_AI_API_URL}}/v2/admin/secrets'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: delete_generic_secret
              type: http
              seq: 2
            http:
              method: DELETE
              url: '{{AICore_AI_API_URL}}/v2/admin/secrets/{{generic_secret}}'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
  - info:
      name: 04_pipeline
      type: folder
      seq: 4
    items:
      - info:
          name: create_pipeline
          type: http
          seq: 1
        http:
          method: POST
          url: '{{AICore_AI_API_URL}}/v2/lm/document-grounding/pipelines'
          headers:
            - name: Content-Type
              value: application/json
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          body:
            type: json
            data: |-
              {
                "type": "MSSharePoint",
                "configuration": {
                  "destination": "{{generic_secret}}",
                  "sharePoint": {
                    "site": {
                      "name": "{{sharepoint_name}}",
                      "includePaths": [
                        "/j4c-custom-knowledge"
                      ]
                    }
                  }
                }
              }
          auth:
            type: bearer
            token: '{{access_token}}'
        runtime:
          scripts:
            - type: before-request
              code: |-
                // Derive the SharePoint site name from SharePoint_URL.
                // The site identifier is the path segment after "/sites/" or "/teams/".
                // Examples:
                //   https://contoso.sharepoint.com/sites/HR%20Team/  -> "HR%20Team"
                //   https://contoso.sharepoint.com/teams/Marketing   -> "Marketing"
                const rawUrl = (bru.getEnvVar("SharePoint_URL") || "").trim();
                if (!rawUrl) {
                  throw new Error("Environment variable 'SharePoint_URL' is not defined.");
                }

                // Strip any trailing slashes (one or many) before parsing.
                const cleanedUrl = rawUrl.replace(/\/+$/, "");

                // Capture the segment after /sites/ or /teams/, stopping at the
                // next path separator, query string, or fragment. Case-insensitive
                // so "/Sites/" and "/Teams/" also match.
                const match = cleanedUrl.match(/\/(?:sites|teams)\/([^\/?#]+)/i);
                if (!match || !match[1]) {
                  throw new Error(
                    `Could not extract SharePoint site name from URL '${rawUrl}'. ` +
                    `Expected format: https://<tenant>.sharepoint.com/sites/<sitename> ` +
                    `or https://<tenant>.sharepoint.com/teams/<sitename>`
                  );
                }

                bru.setVar("sharepoint_name", match[1]);
            - type: after-response
              code: |-
                if (res.getStatus() == 201) {
                  bru.setEnvVar("pipeline_id", res.body.pipelineId);
                }
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: restart_pipeline
          type: http
          seq: 4
        http:
          method: POST
          url: '{{AICore_AI_API_URL}}/v2/lm/document-grounding/pipelines/trigger'
          headers:
            - name: Content-Type
              value: application/json
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          body:
            type: json
            data: |-
              {
                "pipelineId": "{{pipeline_id}}",
                "metadataOnly": false
              }
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: get_pipeline_status
          type: http
          seq: 2
        http:
          method: GET
          url: '{{AICore_AI_API_URL}}/v2/lm/document-grounding/pipelines/{{pipeline_id}}/status'
          headers:
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: get_documents
          type: http
          seq: 3
        http:
          method: GET
          url: '{{AICore_AI_API_URL}}/v2/lm/document-grounding/pipelines/{{pipeline_id}}/documents'
          headers:
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Additional requests
          type: folder
          seq: 5
        request:
          auth: inherit
        items:
          - info:
              name: get_all_pipelines
              type: http
              seq: 1
            http:
              method: GET
              url: '{{AICore_AI_API_URL}}/v2/lm/document-grounding/pipelines'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: get_pipeline
              type: http
              seq: 2
            http:
              method: GET
              url: '{{AICore_AI_API_URL}}/v2/lm/document-grounding/pipelines/{{pipeline_id}}'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: delete_pipeline
              type: http
              seq: 3
            http:
              method: DELETE
              url: '{{AICore_AI_API_URL}}/v2/lm/document-grounding/pipelines/{{pipeline_id}}'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-02-22T10:42:18.994Z'
    exportedUsing: Bruno
