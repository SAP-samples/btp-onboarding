opencollection: 1.0.0
info:
  name: j4c-dg-workzone
config:
  environments:
    - name: j4c-dg-workzone
      variables:
        - name: AiCore_AI_API_URL
          value: <placeholder>
        - name: AiCore_clientid
          value: <placeholder>
        - name: AiCore_clientsecret
          value: <placeholder>
        - name: AiCore_url
          value: <placeholder>
        - name: DWS_URL
          value: <placeholder>
        - name: OAuthClient_Key
          value: <placeholder>
        - name: OAuthClient_Secret
          value: <placeholder>
        - name: resource_group
          value: j4c-custom-documents
        - name: generic_secret
          value: advanced-workzone
        - name: pipeline_id
          value: ''
items:
  - info:
      name: 01_get_token
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: get_token
          type: http
          seq: 1
        http:
          method: POST
          url: '{{AiCore_url}}/oauth/token'
          headers:
            - name: Content-Type
              value: application/x-www-form-urlencoded
          body:
            type: form-urlencoded
            data:
              - name: grant_type
                value: client_credentials
              - name: client_id
                value: '{{AiCore_clientid}}'
              - name: client_secret
                value: '{{AiCore_clientsecret}}'
        runtime:
          scripts:
            - type: after-response
              code: |-
                if (res.getStatus() == 200) {
                  bru.setVar("access_token", res.body.access_token);
                }
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: 02_resource_group
      type: folder
      seq: 2
    items:
      - info:
          name: create
          type: http
          seq: 1
        http:
          method: POST
          url: '{{AiCore_AI_API_URL}}/v2/admin/resourceGroups'
          body:
            type: json
            data: |-
              {
                "resourceGroupId": "{{resource_group}}",
                "labels": [
                  {
                    "key": "ext.ai.sap.com/document-grounding",
                    "value": "true"
                  }
                ]
              }
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: get_by_id
          type: http
          seq: 2
        http:
          method: GET
          url: '{{AiCore_AI_API_URL}}/v2/admin/resourceGroups/{{resource_group}}'
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Additional requests
          type: folder
          seq: 3
        request:
          auth: inherit
        items:
          - info:
              name: get_all
              type: http
              seq: 1
            http:
              method: GET
              url: '{{AiCore_AI_API_URL}}/v2/admin/resourceGroups'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: delete_by_id
              type: http
              seq: 2
            http:
              method: DELETE
              url: '{{AiCore_AI_API_URL}}/v2/admin/resourceGroups/{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
  - info:
      name: 03_generic_secret
      type: folder
      seq: 3
    items:
      - info:
          name: create
          type: http
          seq: 1
        http:
          method: POST
          url: '{{AiCore_AI_API_URL}}/v2/admin/secrets'
          headers:
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          body:
            type: json
            data: |-
              {
                "name": "{{generic_secret}}",
                "data": {
                  "description": "{{repository-description}}",
                  "authentication": "{{repository-authentication}}",
                  "url": "{{repository-url}}",
                  "clientId": "{{repository-clientId}}",
                  "clientSecret": "{{repository-clientSecret}}",
                  "tokenServiceURL": "{{repository-tokenServiceURL}}"
                },
                "labels": [
                  {
                    "key": "ext.ai.sap.com/document-grounding",
                    "value": "true"
                  },
                  {
                    "key": "ext.ai.sap.com/documentRepositoryType",
                    "value": "WorkZone"
                  }
                ]
              }
          auth:
            type: bearer
            token: '{{access_token}}'
        runtime:
          scripts:
            - type: before-request
              code: |-
                const dwsUrl = (bru.getEnvVar("DWS_URL") || "").trim();
                const oauthClientKey = (bru.getEnvVar("OAuthClient_Key") || "").trim();
                const oauthClientSecret = (bru.getEnvVar("OAuthClient_Secret") || "").trim();

                if (!dwsUrl) throw new Error("Environment variable 'DWS_URL' is not defined.");
                if (!oauthClientKey) throw new Error("Environment variable 'OAuthClient_Key' is not defined.");
                if (!oauthClientSecret) throw new Error("Environment variable 'OAuthClient_Secret' is not defined.");

                const workzoneUrl = `https://${dwsUrl}/api/v1/dg-pipeline/metadata`;
                const workzoneTokenServiceURL = `https://${dwsUrl}/api/v1/auth/token`;

                const toB64 = (s) => Buffer.from(s, "utf-8").toString("base64");

                bru.setVar("repository-description", toB64("Advanced Work Zone"));
                bru.setVar("repository-authentication", toB64("OAuth2ClientCredentials"));
                bru.setVar("repository-url", toB64(workzoneUrl));
                bru.setVar("repository-clientId", toB64(oauthClientKey));
                bru.setVar("repository-clientSecret", toB64(oauthClientSecret));
                bru.setVar("repository-tokenServiceURL", toB64(workzoneTokenServiceURL));
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Additional requests
          type: folder
          seq: 2
        request:
          auth: inherit
        items:
          - info:
              name: get_all
              type: http
              seq: 1
            http:
              method: GET
              url: '{{AiCore_AI_API_URL}}/v2/admin/secrets'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: delete_dy_id
              type: http
              seq: 2
            http:
              method: DELETE
              url: '{{AiCore_AI_API_URL}}/v2/admin/secrets/{{generic_secret}}'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
  - info:
      name: 04_pipeline
      type: folder
      seq: 4
    items:
      - info:
          name: create_pipeline
          type: http
          seq: 1
        http:
          method: POST
          url: '{{AiCore_AI_API_URL}}/v2/lm/document-grounding/pipelines'
          headers:
            - name: Content-Type
              value: application/json
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          body:
            type: json
            data: |-
              {
                "type": "WorkZone",
                "metadata": {
                  "destination": "{{generic_secret}}"
                }
              }
          auth:
            type: bearer
            token: '{{access_token}}'
        runtime:
          scripts:
            - type: after-response
              code: |-
                if (res.getStatus() == 201) {
                  bru.setEnvVar("pipeline_id", res.body.pipelineId);
                }
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: restart_pipeline
          type: http
          seq: 2
        http:
          method: POST
          url: '{{AiCore_AI_API_URL}}/v2/lm/document-grounding/pipelines/trigger'
          headers:
            - name: Content-Type
              value: application/json
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          body:
            type: json
            data: |-
              {
                "pipelineId": "{{pipeline_id}}",
                "metadataOnly": false
              }
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: get_pipeline_status
          type: http
          seq: 3
        http:
          method: GET
          url: '{{AiCore_AI_API_URL}}/v2/lm/document-grounding/pipelines/{{pipeline_id}}/status'
          headers:
            - name: AI-Resource-Group
              value: '{{resource_group}}'
          auth:
            type: bearer
            token: '{{access_token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Additional requests
          type: folder
          seq: 4
        request:
          auth: inherit
        items:
          - info:
              name: get_all_pipelines
              type: http
              seq: 1
            http:
              method: GET
              url: '{{AiCore_AI_API_URL}}/v2/lm/document-grounding/pipelines'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: get_pipeline_by_id
              type: http
              seq: 2
            http:
              method: GET
              url: '{{AiCore_AI_API_URL}}/v2/lm/document-grounding/pipelines/{{pipeline_id}}'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: delete_pipeline_by_id
              type: http
              seq: 3
            http:
              method: DELETE
              url: '{{AiCore_AI_API_URL}}/v2/lm/document-grounding/pipelines/{{pipeline_id}}'
              headers:
                - name: AI-Resource-Group
                  value: '{{resource_group}}'
              auth:
                type: bearer
                token: '{{access_token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-02-22T04:59:44.061Z'
    exportedUsing: Bruno
